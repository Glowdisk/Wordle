    plugins {
        id 'java'
        id 'application'
    }

    group = 'com.example'
    version = '1.0-SNAPSHOT'

    repositories {
        mavenCentral() // Standard repository
    }

    dependencies {
        implementation 'com.github.oshi:oshi-core:6.6.1'
    }

    application {
        mainClass = 'Wordle' // Make sure this points to your main class (update if needed)
    }

    jar {
        manifest {
            attributes(
                    'Main-Class': 'Wordle'
            )
        }
    }